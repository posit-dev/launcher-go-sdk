# golangci-lint v2 configuration
# See https://golangci-lint.run/docs/

version: "2"

run:
  timeout: 5m
  tests: true
  build-tags: []

linters:
  default: none
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Vet examines Go source code
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis (includes former gosimple)
    - unused        # Check for unused code
    - misspell      # Check for misspelled words
    - revive        # Fast linter
    - unconvert     # Remove unnecessary conversions
    - unparam       # Detect unused parameters
    - goconst       # Detect repeated strings that could be constants

  settings:
    errcheck:
      check-blank: false
      check-type-assertions: false

    misspell:
      locale: US

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    presets: []
    paths:
      - examples
    rules:
      # Exclude some linters from running on test files
      - path: _test\.go
        linters:
          - errcheck
          - goconst

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/posit-dev/launcher-go-sdk

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
      colors: true
