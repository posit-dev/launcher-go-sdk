name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install just
      uses: extractions/setup-just@v4

    - name: Run tests
      run: just test-verbose

    - name: Build examples
      run: just build-examples

    - name: Extract version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Extract changelog for this version
      id: changelog
      run: |
        # Extract the section for this version from CHANGELOG.md
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        # Remove 'v' prefix for changelog lookup
        VERSION_NUM="${VERSION#v}"

        # Read changelog section
        CHANGELOG=$(sed -n "/^## \[${VERSION_NUM}\]/,/^## \[/p" CHANGELOG.md | sed '$d')

        if [ -z "$CHANGELOG" ]; then
          echo "No changelog found for version ${VERSION_NUM}, using default"
          CHANGELOG="See [CHANGELOG.md](https://github.com/posit-dev/launcher-go-sdk/blob/main/CHANGELOG.md) for details."
        fi

        # Save to file for use in release
        echo "$CHANGELOG" > release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.get_version.outputs.VERSION }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
        generate_release_notes: true

    - name: Publish to pkg.go.dev
      run: |
        # Trigger pkg.go.dev to index the new version
        curl -f "https://proxy.golang.org/github.com/posit-dev/launcher-go-sdk/@v/${{ steps.get_version.outputs.VERSION }}.info" || true
