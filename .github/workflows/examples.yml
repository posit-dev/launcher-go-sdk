name: Examples

on:
  push:
    branches: [ main ]
    paths:
      - 'examples/**'
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [ main ]
    paths:
      - 'examples/**'
      - '**.go'
      - 'go.mod'
      - 'go.sum'

jobs:
  build-examples:
    name: Build Examples
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        example: [inmemory]

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Build ${{ matrix.example }} example
      run: just build-example ${{ matrix.example }}

    - name: Verify binary exists
      working-directory: ./examples/${{ matrix.example }}
      run: |
        if [ ! -f "${{ matrix.example }}" ]; then
          echo "Binary not found!"
          exit 1
        fi
        ls -lh ${{ matrix.example }}

    - name: Test help flag
      working-directory: ./examples/${{ matrix.example }}
      run: ./${{ matrix.example }} --help || true

  verify-readmes:
    name: Verify Example READMEs
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Check inmemory README exists
      run: test -f examples/inmemory/README.md

    - name: Verify READMEs have content
      run: |
        for readme in examples/*/README.md; do
          lines=$(wc -l < "$readme")
          if [ "$lines" -lt 10 ]; then
            echo "README $readme is too short (less than 10 lines)"
            exit 1
          fi
        done
